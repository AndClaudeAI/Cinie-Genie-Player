name: Build TWA APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'twa-manifest.json'
      - 'public/manifest.json'
      - 'public/icon-*.png'
      - '.github/workflows/build-twa.yml'

permissions:
  contents: write

env:
  STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set passwords
        run: |
          if [ -z "$STORE_PASSWORD" ]; then
            echo "STORE_PASSWORD=cinie-genie-debug" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=cinie-genie-debug" >> "$GITHUB_ENV"
          fi

      - name: Configure bubblewrap
        run: |
          mkdir -p "$HOME/.aspect"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' \
            "$JAVA_HOME" "$ANDROID_SDK_ROOT" \
            > "$HOME/.aspect/aspect.config.json"

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias cinie-genie \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -keystore ./cinie-genie.keystore \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Cinie Genie, O=Cinie Genie Studios, C=US"

      - name: Extract signing fingerprint
        id: fingerprint
        run: |
          FINGERPRINT=$(keytool -list -v -keystore ./cinie-genie.keystore \
            -alias cinie-genie -storepass "$STORE_PASSWORD" \
            | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "sha256=$FINGERPRINT" >> "$GITHUB_OUTPUT"
          echo "Signing fingerprint: $FINGERPRINT"

      - name: Initialize TWA project with bubblewrap
        run: |
          mkdir -p twa-build
          cp twa-manifest.json twa-build/twa-manifest.json
          cp cinie-genie.keystore twa-build/cinie-genie.keystore
          cd twa-build
          yes | npx --yes @bubblewrap/cli init \
            --manifest="https://andclaudeai.github.io/Cinie-Genie-Player/manifest.json" 2>&1 || true
          ls -la

      - name: Build TWA APK
        run: |
          cd twa-build
          yes | npx --yes @bubblewrap/cli build \
            --skipPwaValidation 2>&1
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ env.STORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cinie-genie-player-apk
          path: |
            twa-build/**/*.apk
            twa-build/**/*.aab
          if-no-files-found: warn

      - name: Build summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## TWA Build Complete

          **Signing SHA-256:** \`${{ steps.fingerprint.outputs.sha256 }}\`

          Download the APK from the **Artifacts** section above.

          ### Digital Asset Links Setup
          For full TWA mode (no browser toolbar), serve this JSON at
          \`https://andclaudeai.github.io/.well-known/assetlinks.json\`:

          \`\`\`json
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "com.ciniegenie.player",
              "sha256_cert_fingerprints": ["${{ steps.fingerprint.outputs.sha256 }}"]
            }
          }]
          \`\`\`
          EOF
